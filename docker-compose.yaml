services:
  # ----------------------------------------
  # CLICKHOUSE
  # ----------------------------------------
  clickhouse-server:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse-server
    restart: unless-stopped

    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    ports:
      - "8123:8123"
      - "9000:9000"

    volumes:
      - clickhouse-data:/var/lib/clickhouse

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # KAFKA (KRaft)
  # ----------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "nc -z localhost 9092"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # AKHQ
  # ----------------------------------------
  akhq:
    image: tchiotludo/akhq:0.25.0
    container_name: akhq
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local-kafka:
              properties:
                bootstrap.servers: "kafka:29092"

    depends_on:
      kafka:
        condition: service_healthy

  # ----------------------------------------
  # RISINGWAVE
  # ----------------------------------------
  risingwave:
    image: risingwavelabs/risingwave:v2.8.4
    container_name: risingwave
    restart: unless-stopped

    command: "single_node"

    ports:
      - "4566:4566"
      - "5691:5691"

    volumes:
      - risingwave-data:/risingwave/state

    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/4566"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  # ----------------------------------------
  # KAFKA CONNECT (Debezium)
  # ----------------------------------------
  connect:
    image: quay.io/debezium/connect:2.7
    container_name: connect
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "connect-cluster"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  clickhouse-data:
  kafka-data:
  risingwave-data: