services:
  # ----------------------------------------
  # CLICKHOUSE
  # ----------------------------------------
  clickhouse-server:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse-server
    restart: unless-stopped

    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    ports:
      - "8123:8123"
      - "9000:9000"

    volumes:
      - clickhouse-data:/var/lib/clickhouse

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # KAFKA (KRaft)
  # ----------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "nc -z localhost 9092"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # AKHQ
  # ----------------------------------------
  akhq:
    image: tchiotludo/akhq:0.25.0
    container_name: akhq
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local-kafka:
              properties:
                bootstrap.servers: "kafka:29092"

    depends_on:
      kafka:
        condition: service_healthy

  # ----------------------------------------
  # RISINGWAVE
  # ----------------------------------------
  risingwave:
    image: risingwavelabs/risingwave:v2.1.0
    container_name: risingwave
    restart: unless-stopped

    command: "single_node"

    ports:
      - "4566:4566"
      - "5691:5691"

    volumes:
      - risingwave-data:/risingwave/state

    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-h",
          "localhost",
          "-p",
          "4566"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  # ----------------------------------------
  # KAFKA CONNECT
  # ----------------------------------------
  connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: connect
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"

      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: connect

      CONNECT_GROUP_ID: connect-cluster

      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter

      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components

    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt debezium/debezium-connector-mysql:latest
        confluent-hub install --no-prompt debezium/debezium-connector-postgresql:latest
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
        confluent-hub install --no-prompt clickhouse/kafka-connect-clickhouse:latest

        /etc/confluent/docker/run

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8083/connectors"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------
  # DBT
  # ----------------------------------------
  dbt:
    image: python:3.11-slim
    container_name: dbt

    working_dir: /usr/app

    depends_on:
      risingwave:
        condition: service_healthy

    volumes:
      - ./dbt_streaming_project:/usr/app
      - ./dbt_profiles:/root/.dbt

    command: >
      bash -c "
        apt-get update &&
        apt-get install -y netcat-openbsd gcc build-essential &&
        pip install --no-cache-dir dbt-risingwave &&
        while ! nc -z risingwave 4566;
        do
          echo 'Waiting for RisingWave...';
          sleep 2;
        done &&
        dbt debug --profiles-dir /root/.dbt &&
        dbt run --profiles-dir /root/.dbt --project-dir /usr/app
      "

volumes:
  clickhouse-data:
  kafka-data:
  risingwave-data: